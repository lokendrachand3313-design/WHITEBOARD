<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate Teaching Studio | Google Slides + 15 Shapes + Highlighter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0f172a;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #1e293b;
        }

        /* Top toolbar - more compact */
        .toolbar {
            background: #0f172a;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-bottom: 2px solid #f4a261;
            z-index: 30;
            overflow-x: auto;
            min-height: 55px;
        }

        .tool-group {
            display: inline-flex;
            gap: 4px;
            background: #1e293b;
            padding: 3px 8px;
            border-radius: 40px;
            margin: 0 2px;
        }

        .tool-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 32px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            transition: 0.1s;
        }

        .tool-btn.active {
            background: #f4a261;
            color: #0f172a;
        }

        .tool-btn:hover {
            background: #475569;
        }

        .color-picker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
        }

        .board-color-option {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: 0.1s;
        }

        .board-color-option:hover {
            transform: scale(1.1);
        }

        input[type="range"] {
            width: 70px;
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            gap: 4px;
            background: #0f172a;
            padding: 5px 20px;
            border-bottom: 1px solid #334155;
        }

        .tab {
            background: #1e293b;
            padding: 5px 20px;
            border-radius: 30px;
            color: #cbd5e1;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .tab.active {
            background: #f4a261;
            color: #0f172a;
        }

        /* Main area - full height */
        .main-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #0f172a;
        }

        .panel.active {
            display: flex;
            flex-direction: column;
        }

        /* Infinite Whiteboard */
        #whiteboardContainer {
            overflow: auto;
            background: #94a3b8;
            cursor: grab;
            position: relative;
            flex: 1;
        }

        #whiteboardContainer:active {
            cursor: grabbing;
        }

        .infinite-canvas {
            position: relative;
            width: 4000px;
            height: 4000px;
            background: #ffffff;
            transform-origin: 0 0;
        }

        #mainCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        /* Google Slides Panel - Full view */
        #slidesPanel {
            padding: 15px;
            overflow-y: auto;
        }

        .google-slides-container {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .embed-input-area {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        #googleSlidesUrl {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            background: #334155;
            color: white;
            outline: none;
            font-size: 0.85rem;
        }

        .slides-preview {
            flex: 1;
            margin-top: 15px;
            border-radius: 16px;
            overflow: hidden;
            background: #0f172a;
            min-height: 500px;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 550px;
            border: none;
            border-radius: 16px;
        }

        /* Images Panel */
        #imagesPanel {
            padding: 15px;
            overflow-y: auto;
        }

        .image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .image-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 6px;
            width: 120px;
            cursor: pointer;
            text-align: center;
        }

        .image-card img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* Google Search Overlay */
        .search-overlay {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 1000;
            background: #0f172aee;
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 8px 16px;
            border: 1px solid #f4a261;
        }

        .search-input-area {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        #googleSearchInput {
            padding: 6px 12px;
            border-radius: 32px;
            border: none;
            width: 200px;
            outline: none;
            font-size: 0.8rem;
        }

        .search-results-popup {
            position: fixed;
            bottom: 80px;
            right: 15px;
            width: 360px;
            max-height: 400px;
            background: #1e293b;
            border-radius: 20px;
            padding: 10px;
            overflow-y: auto;
            box-shadow: 0 10px 25px black;
            border: 1px solid #f4a261;
            z-index: 1001;
        }

        .search-result-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            background: #334155;
            border-radius: 14px;
            padding: 6px;
            cursor: pointer;
        }

        .search-result-item img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 10px;
        }

        .result-buttons {
            display: flex;
            gap: 6px;
            margin-left: auto;
            align-items: center;
        }

        .small-action {
            background: #f4a261;
            border: none;
            padding: 3px 8px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .shape-dropdown {
            position: relative;
            display: inline-block;
        }

        .shape-menu {
            display: none;
            position: absolute;
            background: #1e293b;
            min-width: 180px;
            border-radius: 16px;
            padding: 8px;
            top: 35px;
            left: 0;
            z-index: 50;
            flex-wrap: wrap;
            gap: 5px;
            border: 1px solid #f4a261;
        }

        .shape-menu button {
            background: #334155;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            margin: 2px;
        }

        .shape-dropdown:hover .shape-menu {
            display: flex;
        }

        .zoom-control {
            background: #0f172a;
            border-radius: 32px;
            padding: 2px 6px;
        }

        .bg-color-palette {
            display: flex;
            gap: 5px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="toolbar">
        <div class="tool-group">
            <button id="drawPenBtn" class="tool-btn active">✏️ Pen</button>
            <button id="highlighterBtn" class="tool-btn">🟡 Highlighter</button>
            <button id="eraseBtn" class="tool-btn">🧽 Eraser</button>
            <button id="textToolBtn" class="tool-btn">📝 Text</button>
            <div class="shape-dropdown">
                <button id="shapesBtn" class="tool-btn">🔷 Shapes ▼</button>
                <div class="shape-menu" id="shapeMenuContainer">
                    <!-- 15 shapes will be populated here -->
                </div>
            </div>
        </div>
        <div class="tool-group">
            <input type="color" id="penColorPicker" class="color-picker" value="#e34234">
            <input type="range" id="penWidthSlider" min="2" max="30" value="4">
        </div>
        <div class="tool-group">
            <span style="color:white; font-size:0.7rem;">Board:</span>
            <div class="bg-color-palette" id="boardColorPalette">
                <div class="board-color-option" style="background:#000000;" data-color="#000000"></div>
                <div class="board-color-option" style="background:#ffffff;" data-color="#ffffff"></div>
                <div class="board-color-option" style="background:#22c55e;" data-color="#22c55e"></div>
                <div class="board-color-option" style="background:#3b82f6;" data-color="#3b82f6"></div>
                <div class="board-color-option" style="background:#ef4444;" data-color="#ef4444"></div>
            </div>
            <button id="clearCanvasBtn" class="tool-btn">🗑️ Clear</button>
        </div>
        <div class="tool-group zoom-control">
            <button id="zoomOutBtn" class="tool-btn">🔍-</button>
            <span id="zoomLevel" style="color:white;">100%</span>
            <button id="zoomInBtn" class="tool-btn">🔍+</button>
            <button id="resetViewBtn" class="tool-btn">⟳ Reset</button>
            <button id="panModeBtn" class="tool-btn">✋ Pan</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" data-tab="whiteboard">🎨 Whiteboard</div>
        <div class="tab" data-tab="slides">📽️ Google Slides</div>
        <div class="tab" data-tab="images">🖼️ My Images</div>
    </div>

    <div class="main-area">
        <div id="whiteboardPanel" class="panel active">
            <div id="whiteboardContainer" style="width:100%; height:100%; overflow:auto; background:#94a3b8;">
                <div class="infinite-canvas" id="infiniteCanvasWrapper">
                    <canvas id="mainCanvas" width="4000" height="4000"></canvas>
                </div>
            </div>
        </div>

        <!-- Google Slides Panel - Larger View -->
        <div id="slidesPanel" class="panel">
            <div class="google-slides-container" style="height: 100%; display: flex; flex-direction: column;">
                <h3 style="color:#f4a261; font-size:1rem;">📽️ Google Slides Integration</h3>
                <p style="color:#94a3b8; font-size:0.75rem;">Paste embed link from File → Share → Publish to web → Embed</p>
                <div class="embed-input-area">
                    <input type="text" id="googleSlidesUrl" placeholder="https://docs.google.com/presentation/d/.../embed">
                    <button id="loadGoogleSlidesBtn" class="tool-btn">📥 Load Presentation</button>
                </div>
                <div id="slidesPreviewContainer" class="slides-preview" style="flex:1; min-height: 0;">
                    <div style="color:#94a3b8; padding:40px; text-align:center;">📄 Paste a Google Slides embed link above to view presentation here</div>
                </div>
            </div>
        </div>

        <div id="imagesPanel" class="panel">
            <h3 style="color:#f4a261;">📸 Saved Images Library</h3>
            <button id="clearAllImagesBtn" class="tool-btn" style="margin:10px 0;">Clear All Images</button>
            <div id="imageLibraryGrid" class="image-grid"></div>
        </div>
    </div>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-input-area">
            <input type="text" id="googleSearchInput" placeholder="🔍 Search images (diagram, map, etc)">
            <button id="searchGoogleBtn" class="tool-btn">Search</button>
            <button id="toggleSearchBtn" style="background:#f4a261; border:none; border-radius:30px; padding:3px 8px;">✖</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== INFINITE CANVAS ==========
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 4000;
        canvas.height = 4000;
        
        let drawing = false;
        let currentTool = 'pen';
        let currentColor = '#e34234';
        let currentWidth = 4;
        let startX = 0, startY = 0;
        let lastX = 0, lastY = 0;
        let canvasState = null;
        
        // Pan & Zoom
        const container = document.getElementById('whiteboardContainer');
        const wrapper = document.getElementById('infiniteCanvasWrapper');
        let scale = 1;
        let panX = 0, panY = 0;
        
        function updateTransform() {
            wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            document.getElementById('zoomLevel').innerText = Math.round(scale * 100) + '%';
        }
        
        function saveCanvasState() {
            canvasState = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
        
        function clearFullBoard() {
            const bgColor = localStorage.getItem('boardBgColor') || '#ffffff';
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveCanvasState();
        }
        
        // Board color selection
        document.querySelectorAll('.board-color-option').forEach(opt => {
            opt.addEventListener('click', () => {
                const color = opt.getAttribute('data-color');
                localStorage.setItem('boardBgColor', color);
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveCanvasState();
            });
        });
        
        clearFullBoard();
        
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.min(Math.max(0, x), canvas.width);
            y = Math.min(Math.max(0, y), canvas.height);
            return { x, y };
        }
        
        // Text placement
        function placeTextAt(x, y) {
            const text = prompt("✏️ Enter your text:", "Type here...");
            if (text && text.trim()) {
                ctx.font = `bold ${Math.max(16, currentWidth * 2.5)}px "Segoe UI"`;
                ctx.fillStyle = currentColor;
                ctx.fillText(text, x, y);
                saveCanvasState();
            }
            setTool('pen');
        }
        
        // ========== 15 SHAPE FUNCTIONS ==========
        function drawRectangle(x, y, w, h) {
            ctx.strokeStyle = currentColor;
            ctx.fillStyle = currentColor + '40';
            ctx.lineWidth = currentWidth;
            ctx.strokeRect(x, y, w, h);
            saveCanvasState();
        }
        
        function drawCircle(x, y, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI*2);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentWidth;
            ctx.stroke();
            saveCanvasState();
        }
        
        function drawLine(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentWidth;
            ctx.stroke();
            saveCanvasState();
        }
        
        function drawArrow(fromX, fromY, toX, toY) {
            const angle = Math.atan2(toY - fromY, toX - fromX);
            const arrowSize = 20;
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentWidth;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - arrowSize * Math.cos(angle - Math.PI/6), toY - arrowSize * Math.sin(angle - Math.PI/6));
            ctx.lineTo(toX - arrowSize * Math.cos(angle + Math.PI/6), toY - arrowSize * Math.sin(angle + Math.PI/6));
            ctx.fillStyle = currentColor;
            ctx.fill();
            saveCanvasState();
        }
        
        function drawStar(cx, cy, outerR, innerR, points) {
            let rot = Math.PI/2*3;
            const step = Math.PI / points;
            ctx.beginPath();
            for (let i = 0; i < points; i++) {
                const x1 = cx + Math.cos(rot) * outerR;
                const y1 = cy + Math.sin(rot) * outerR;
                ctx.lineTo(x1, y1);
                rot += step;
                const x2 = cx + Math.cos(rot) * innerR;
                const y2 = cy + Math.sin(rot) * innerR;
                ctx.lineTo(x2, y2);
                rot += step;
            }
            ctx.closePath();
            ctx.fillStyle = currentColor + '80';
            ctx.fill();
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentWidth;
            ctx.stroke();
            saveCanvasState();
        }
        
        function drawTriangle(x, y, w, h) {
            ctx.beginPath();
            ctx.moveTo(x + w/2, y);
            ctx.lineTo(x + w, y + h);
            ctx.lineTo(x, y + h);
            ctx.closePath();
            ctx.fillStyle = currentColor + '40';
            ctx.fill();
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentWidth;
            ctx.stroke();
            saveCanvasState();
        }
        
        function drawDiamond(x, y, w, h) {
            ctx.beginPath();
            ctx.moveTo(x + w/2, y);
            ctx.lineTo(x + w, y + h/2);
            ctx.lineTo(x + w/2, y + h);
            ctx.lineTo(x, y + h/2);
            ctx.closePath();
            ctx.fillStyle = currentColor + '40';
            ctx.fill();
            ctx.stroke();
            saveCanvasState();
        }
        
        function drawHeart(x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y + size/4);
            ctx.bezierCurveTo(x, y, x + size/2, y, x + size/2, y + size/4);
            ctx.bezierCurveTo(x + size/2, y, x + size, y, x + size, y + size/4);
            ctx.bezierCurveTo(x + size, y + size/2, x + size/2, y + size*0.75, x + size/2, y + size);
            ctx.bezierCurveTo(x + size/2, y + size*0.75, x, y + size/2, x, y + size/4);
            ctx.fillStyle = currentColor + '80';
            ctx.fill();
            ctx.stroke();
            saveCanvasState();
        }
        
        // Shape mapping
        const shapes = {
            'rectangle': drawRectangle,
            'circle': drawCircle,
            'line': drawLine,
            'arrow': drawArrow,
            'star': (x, y, w, h) => drawStar(x + w/2, y + h/2, w/2, w/4, 5),
            'triangle': drawTriangle,
            'diamond': drawDiamond,
            'heart': (x, y, w, h) => drawHeart(x, y, Math.min(w, h)),
            'square': (x, y, w, h) => drawRectangle(x, y, Math.min(w, h), Math.min(w, h)),
            'oval': (x, y, w, h) => {
                ctx.beginPath();
                ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI*2);
                ctx.stroke();
                saveCanvasState();
            },
            'pentagon': (x, y, w, h) => {
                ctx.beginPath();
                const centerX = x + w/2, centerY = y + h/2, radius = Math.min(w, h)/2;
                for(let i=0; i<5; i++) {
                    const angle = -Math.PI/2 + i * 2*Math.PI/5;
                    const px = centerX + radius * Math.cos(angle);
                    const py = centerY + radius * Math.sin(angle);
                    if(i===0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                saveCanvasState();
            },
            'hexagon': (x, y, w, h) => {
                ctx.beginPath();
                const centerX = x + w/2, centerY = y + h/2, radius = Math.min(w, h)/2;
                for(let i=0; i<6; i++) {
                    const angle = i * 2*Math.PI/6;
                    const px = centerX + radius * Math.cos(angle);
                    const py = centerY + radius * Math.sin(angle);
                    if(i===0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                saveCanvasState();
            },
            'cloud': (x, y, w, h) => {
                ctx.beginPath();
                ctx.arc(x + w*0.2, y + h*0.5, w*0.25, 0, Math.PI*2);
                ctx.arc(x + w*0.5, y + h*0.3, w*0.3, 0, Math.PI*2);
                ctx.arc(x + w*0.8, y + h*0.5, w*0.25, 0, Math.PI*2);
                ctx.arc(x + w*0.5, y + h*0.7, w*0.2, 0, Math.PI*2);
                ctx.stroke();
                saveCanvasState();
            },
            'cross': (x, y, w, h) => {
                ctx.beginPath();
                ctx.moveTo(x + w/2, y);
                ctx.lineTo(x + w/2, y + h);
                ctx.moveTo(x, y + h/2);
                ctx.lineTo(x + w, y + h/2);
                ctx.stroke();
                saveCanvasState();
            }
        };
        
        let currentShape = 'rectangle';
        let shapeStart = null;
        
        // Build 15 shapes menu
        const shapeNames = ['rectangle', 'circle', 'line', 'arrow', 'star', 'triangle', 'diamond', 'heart', 'square', 'oval', 'pentagon', 'hexagon', 'cloud', 'cross'];
        const shapeIcons = { rectangle:'⬜', circle:'⚪', line:'📏', arrow:'➡️', star:'⭐', triangle:'🔺', diamond:'🔷', heart:'❤️', square:'⬛', oval:'⚫', pentagon:'⬟', hexagon:'⬡', cloud:'☁️', cross:'✚' };
        const shapeMenu = document.getElementById('shapeMenuContainer');
        shapeNames.forEach(shape => {
            const btn = document.createElement('button');
            btn.innerHTML = `${shapeIcons[shape] || '📐'} ${shape.charAt(0).toUpperCase()+shape.slice(1)}`;
            btn.onclick = () => {
                currentShape = shape;
                document.getElementById('shapesBtn').innerHTML = `${shapeIcons[shape] || '🔷'} ${shape.charAt(0).toUpperCase()+shape.slice(1)} ▼`;
                setTool('shape');
            };
            shapeMenu.appendChild(btn);
        });
        
        // Drawing logic
        function startDrawing(e) {
            if (currentTool === 'pan') return;
            drawing = true;
            const pos = getCanvasCoords(e);
            startX = pos.x; startY = pos.y;
            lastX = pos.x; lastY = pos.y;
            
            if (currentTool === 'text') {
                placeTextAt(startX, startY);
                drawing = false;
                return;
            }
            if (currentTool === 'erase') {
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(startX, startY, currentWidth, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
                saveCanvasState();
                drawing = false;
                return;
            }
            if (currentTool === 'shape') {
                shapeStart = { x: startX, y: startY };
            }
        }
        
        function drawMove(e) {
            if (!drawing) return;
            const pos = getCanvasCoords(e);
            const currX = pos.x, currY = pos.y;
            
            if (currentTool === 'pen') {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currX, currY);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentWidth;
                ctx.stroke();
                lastX = currX; lastY = currY;
                saveCanvasState();
            }
            else if (currentTool === 'highlighter') {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currX, currY);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentWidth * 1.5;
                ctx.globalAlpha = 0.4;
                ctx.stroke();
                ctx.globalAlpha = 1;
                lastX = currX; lastY = currY;
                saveCanvasState();
            }
        }
        
        function endDrawing(e) {
            if (!drawing) return;
            const pos = getCanvasCoords(e);
            const endX = pos.x, endY = pos.y;
            const w = endX - startX, h = endY - startY;
            
            if (currentTool === 'shape' && shapeStart) {
                ctx.strokeStyle = currentColor;
                ctx.fillStyle = currentColor + '30';
                ctx.lineWidth = currentWidth;
                const shapeFn = shapes[currentShape];
                if(shapeFn) shapeFn(startX, startY, Math.abs(w), Math.abs(h));
                saveCanvasState();
            }
            drawing = false;
            shapeStart = null;
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', drawMove);
        canvas.addEventListener('mouseup', endDrawing);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawMove(e); });
        canvas.addEventListener('touchend', endDrawing);
        
        // Tool management
        function setTool(tool) {
            currentTool = tool;
            canvas.style.cursor = (tool === 'text') ? 'text' : 'crosshair';
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if (tool === 'pen') document.getElementById('drawPenBtn').classList.add('active');
            if (tool === 'highlighter') document.getElementById('highlighterBtn').classList.add('active');
            if (tool === 'erase') document.getElementById('eraseBtn').classList.add('active');
            if (tool === 'text') document.getElementById('textToolBtn').classList.add('active');
            if (tool === 'pan') document.getElementById('panModeBtn').classList.add('active');
            ctx.globalAlpha = 1;
        }
        
        document.getElementById('drawPenBtn').onclick = () => setTool('pen');
        document.getElementById('highlighterBtn').onclick = () => setTool('highlighter');
        document.getElementById('eraseBtn').onclick = () => setTool('erase');
        document.getElementById('textToolBtn').onclick = () => setTool('text');
        document.getElementById('panModeBtn').onclick = () => setTool('pan');
        document.getElementById('penColorPicker').onchange = (e) => currentColor = e.target.value;
        document.getElementById('penWidthSlider').oninput = (e) => currentWidth = parseInt(e.target.value);
        document.getElementById('clearCanvasBtn').onclick = () => clearFullBoard();
        
        // Pan & Zoom
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        container.addEventListener('mousedown', (e) => {
            if (currentTool === 'pan') {
                isPanning = true;
                panStart.x = e.clientX - panX;
                panStart.y = e.clientY - panY;
                container.style.cursor = 'grabbing';
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (isPanning && currentTool === 'pan') {
                panX = e.clientX - panStart.x;
                panY = e.clientY - panStart.y;
                updateTransform();
            }
        });
        window.addEventListener('mouseup', () => { isPanning = false; container.style.cursor = 'grab'; });
        
        document.getElementById('zoomInBtn').onclick = () => { scale = Math.min(scale + 0.1, 3); updateTransform(); };
        document.getElementById('zoomOutBtn').onclick = () => { scale = Math.max(scale - 0.1, 0.3); updateTransform(); };
        document.getElementById('resetViewBtn').onclick = () => { scale = 1; panX = 0; panY = 0; updateTransform(); };
        
        // Google Slides Integration
        const slidesPreview = document.getElementById('slidesPreviewContainer');
        document.getElementById('loadGoogleSlidesBtn').onclick = () => {
            let url = document.getElementById('googleSlidesUrl').value.trim();
            if (!url) { alert("Please paste Google Slides embed URL"); return; }
            if (url.includes('/d/') && !url.includes('embed')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match) url = `https://docs.google.com/presentation/d/${match[1]}/embed`;
            }
            slidesPreview.innerHTML = `<iframe src="${url}" allowfullscreen style="width:100%; height:100%; min-height:550px;"></iframe>`;
        };
        
        // Google Image Search
        const searchBtn = document.getElementById('searchGoogleBtn');
        const searchInput = document.getElementById('googleSearchInput');
        let resultsPopup = null;
        
        async function searchGoogleImages(query) {
            if (!query.trim()) return;
            if (resultsPopup) resultsPopup.remove();
            resultsPopup = document.createElement('div');
            resultsPopup.className = 'search-results-popup';
            resultsPopup.innerHTML = '<div style="color:#ffd966;">🔎 Searching images...</div>';
            document.body.appendChild(resultsPopup);
            
            const imageUrls = [];
            for(let i=0;i<12;i++) {
                imageUrls.push(`https://source.unsplash.com/featured/300x200?${encodeURIComponent(query)}&sig=${Date.now()}+${i}`);
            }
            resultsPopup.innerHTML = '<div style="color:#ffd966;">✨ Click image → Choose action ✨</div>';
            for(let url of imageUrls) {
                const resultDiv = document.createElement('div');
                resultDiv.className = 'search-result-item';
                const img = document.createElement('img');
                img.src = url;
                const btnDiv = document.createElement('div');
                btnDiv.className = 'result-buttons';
                const showBtn = document.createElement('button');
                showBtn.innerText = '📌 Board';
                showBtn.className = 'small-action';
                const saveBtn = document.createElement('button');
                saveBtn.innerText = '💾 Save';
                saveBtn.className = 'small-action';
                
                showBtn.onclick = () => {
                    const fullImg = new Image();
                    fullImg.onload = () => {
                        const bg = localStorage.getItem('boardBgColor') || '#ffffff';
                        ctx.fillStyle = bg;
                        ctx.fillRect(0,0,canvas.width,canvas.height);
                        let w = canvas.width, h = canvas.height;
                        const ratio = fullImg.width/fullImg.height;
                        if(ratio > canvas.width/canvas.height) { w = canvas.width; h = w/ratio; }
                        else { h = canvas.height; w = h*ratio; }
                        ctx.drawImage(fullImg, (canvas.width-w)/2, (canvas.height-h)/2, w, h);
                        saveCanvasState();
                        document.querySelector('.tab[data-tab="whiteboard"]').click();
                        if(resultsPopup) resultsPopup.remove();
                    };
                    fullImg.src = url;
                };
                saveBtn.onclick = () => {
                    const saveImg = new Image();
                    saveImg.crossOrigin = "Anonymous";
                    saveImg.onload = () => {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = saveImg.width;
                        tempCanvas.height = saveImg.height;
                        tempCanvas.getContext('2d').drawImage(saveImg,0,0);
                        userImages.push({ id: Date.now(), dataURL: tempCanvas.toDataURL() });
                        renderImageLibrary();
                        alert("✅ Saved to My Images!");
                        if(resultsPopup) resultsPopup.remove();
                    };
                    saveImg.src = url;
                };
                btnDiv.appendChild(showBtn);
                btnDiv.appendChild(saveBtn);
                resultDiv.appendChild(img);
                resultDiv.appendChild(btnDiv);
                resultsPopup.appendChild(resultDiv);
            }
        }
        
        searchBtn.onclick = () => searchGoogleImages(searchInput.value);
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') searchGoogleImages(searchInput.value); });
        document.getElementById('toggleSearchBtn').onclick = () => { if(resultsPopup) resultsPopup.remove(); };
        
        // Images Library
        let userImages = [];
        const imageGrid = document.getElementById('imageLibraryGrid');
        function renderImageLibrary() {
            if(userImages.length === 0) { imageGrid.innerHTML = '<div style="color:#aaa;">No saved images. Search & save images.</div>'; return; }
            imageGrid.innerHTML = '';
            userImages.forEach(img => {
                const card = document.createElement('div');
                card.className = 'image-card';
                const thumb = document.createElement('img');
                thumb.src = img.dataURL;
                card.appendChild(thumb);
                card.onclick = () => {
                    const big = new Image();
                    big.onload = () => {
                        const bg = localStorage.getItem('boardBgColor') || '#ffffff';
                        ctx.fillStyle = bg;
                        ctx.fillRect(0,0,canvas.width,canvas.height);
                        let w = canvas.width, h = canvas.height;
                        const ratio = big.width/big.height;
                        if(ratio > canvas.width/canvas.height) { w = canvas.width; h = w/ratio; }
                        else { h = canvas.height; w = h*ratio; }
                        ctx.drawImage(big, (canvas.width-w)/2, (canvas.height-h)/2, w, h);
                        saveCanvasState();
                        document.querySelector('.tab[data-tab="whiteboard"]').click();
                    };
                    big.src = img.dataURL;
                };
                imageGrid.appendChild(card);
            });
        }
        document.getElementById('clearAllImagesBtn').onclick = () => { userImages = []; renderImageLibrary(); };
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(tab.getAttribute('data-tab') + 'Panel').classList.add('active');
            };
        });
        
        renderImageLibrary();
        setTool('pen');
        updateTransform();
    })();
</script>
</body>
</html>
